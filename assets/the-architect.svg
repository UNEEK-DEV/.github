<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 210" role="img" aria-label="THE ARCHITECT — build, ship, collect, repeat">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e7ad"/>
      <stop offset="0.46" stop-color="#d8b446"/>
      <stop offset="0.56" stop-color="#caa032"/>
      <stop offset="1" stop-color="#7c6020"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0"/>
