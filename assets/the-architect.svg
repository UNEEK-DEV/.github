  <rect width="960" height="140" fill="#0a0a0a"/>
  <text x="480" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="url(#gold)" letter-spacing="12" filter="url(#glow)">THE ARCHITECT</text>
  <text x="480" y="118" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#666" letter-spacing="6">NEEKMODE · UNEEK-DEV</text>
