      <stop offset="0%" stop-color="#5c4a1f"/>
      <stop offset="25%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f8e8b8"/>
      <stop offset="75%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#5c4a1f"/>
