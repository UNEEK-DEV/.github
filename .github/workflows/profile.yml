name: Build org profile

# Regenerates profile/README.md from data/ + templates/ on every change.
# Add a property = edit data/properties.json and push. This does the rest.

on:
  push:
    branches: [main]
    paths:
      - data/**
      - templates/**
      - scripts/**
      - assets/**
      - .github/workflows/profile.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-profile
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Render profile
        run: node scripts/build-profile.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain profile/README.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile/README.md
            git commit -m "chore: rebuild org profile [skip ci]"
            git push
          else
            echo "profile already up to date"
          fi
